<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CapEye v10 — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script><script src="ac-data.js"></script>
<style>
:root{--red:#C8102E;--navy:#003DA5;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--bg:#F7F8FA;--white:#fff;--border:#E5E7EB;--font:'IBM Plex Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--ink)}
.nav{position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-mark{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:2px;text-transform:uppercase}
.nav-name{font-size:14px;font-weight:700;color:var(--ink)}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--ink3);text-decoration:none;white-space:nowrap;transition:all .15s}
.nav-link:hover{background:var(--bg);color:var(--ink)}
.nav-link.active{background:var(--red);color:#fff}
.nav-link i{font-size:11px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-user{font-size:12px;font-weight:600;color:var(--ink3);background:var(--bg);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}
.shell{margin-top:54px;height:calc(100vh - 54px);overflow:hidden;display:flex;flex-direction:column}
.toolbar{padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-input{padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--font);background:#fff;color:var(--ink);width:180px}
.tb-select{padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:var(--font);background:#fff;color:var(--ink)}
.tb-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:var(--font);border:none;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-red{background:var(--red);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--ink3)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-price-drop{background:#f59e0b;color:#fff}
.table-wrap{flex:1;overflow:auto}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#fff;border-bottom:2px solid var(--border);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);position:sticky;top:0;z-index:1;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--bg);cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f0f4ff}
tbody td{padding:9px 12px;color:var(--ink2);white-space:nowrap}
.reg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--ink)}
.stage-badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;color:#fff}
.status-in{background:#d1fae5;color:#065f46}
.status-out{background:#fee2e2;color:#991b1b}
.status-sold{background:#e2e8f0;color:#475569}
.urgent-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-right:4px}
.price-drop-badge{background:#fee2e2;color:#991b1b;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;text-transform:uppercase}
.no-price{color:#f59e0b;font-weight:700}
.purchase-price{color:var(--ink3);font-style:italic}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:18px;color:var(--ink3);cursor:pointer}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--ink)}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
</style>
</head><body>
<nav class="nav">
  <a class="nav-brand" href="index.html"><span class="nav-mark">CE</span><span class="nav-name">CapEye</span></a>
  <div class="nav-div"></div>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a class="nav-link" href="workflow.html"><i class="fas fa-arrows-rotate"></i> Workflow</a>
    <a class="nav-link active" href="inventory.html"><i class="fas fa-car"></i> Inventory</a>
    <a class="nav-link" href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
    <a class="nav-link" href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
    <a class="nav-link" href="keys.html"><i class="fas fa-key"></i> Keys</a>
    <a class="nav-link" href="auction.html"><i class="fas fa-gavel"></i> Auction</a>
    <a class="nav-link" href="accessories.html"><i class="fas fa-wrench"></i> Accessories</a>
    <a class="nav-link" href="aftersales.html"><i class="fas fa-headset"></i> Aftersales</a>
    <a class="nav-link" href="audit.html"><i class="fas fa-list-check"></i> Audit</a>
    <a class="nav-link" href="team.html"><i class="fas fa-users"></i> Team</a>
    <a class="nav-link" href="admin.html"><i class="fas fa-cog"></i> Admin</a>
  </div>
  <div class="nav-right"><span class="nav-user" id="nav-user">Keith Hardy</span></div>
</nav>
<div class="shell">
  <div class="toolbar">
    <input type="text" class="tb-input" id="search" placeholder="Search reg, make, model..." oninput="renderTable()">
    <select class="tb-select" id="f-stage" onchange="renderTable()">
      <option value="">All Stages</option>
      <option value="Sold">Sold (Archive)</option>
      <option value="Auction">Auction</option>
    </select>
    <select class="tb-select" id="f-status" onchange="renderTable()">
      <option value="">All Status</option>
      <option value="In Stock">In Stock</option>
      <option value="Off-site">Off-site</option>
      <option value="Sold">Sold</option>
    </select>
    <select class="tb-select" id="f-no-price" onchange="renderTable()">
      <option value="">All</option>
      <option value="1">No Price Only</option>
    </select>
    <button class="tb-btn btn-price-drop" onclick="openPriceDrop()"><i class="fas fa-tag"></i> Price Drop</button>
    <button class="tb-btn btn-navy" onclick="location.href='vehicle-overview.html'"><i class="fas fa-plus"></i> Add Vehicle</button>
    <span style="font-size:11px;color:var(--ink3);margin-left:auto" id="row-count"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th><th>Reg</th><th>Make / Model</th><th>Colour</th><th>Mileage</th><th>MOT</th>
          <th>Stage</th><th>Days in Stage</th><th>Price</th><th id="pp-header" style="display:none">Purchase Price</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="inv-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Price Drop Modal -->
<div class="modal-bg" id="price-drop-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Price Drop</div>
      <button class="modal-close" onclick="document.getElementById('price-drop-modal').classList.remove('open')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Vehicle</label>
        <select class="form-input" id="pd-reg">
          <option value="">Select vehicle...</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Current Price</label><input type="text" class="form-input" id="pd-current" readonly></div>
      <div class="form-row"><label class="form-label">New Price (£)</label><input type="number" class="form-input" id="pd-new" placeholder="e.g. 10999"></div>
      <div class="form-row"><label class="form-label">Reason</label><input type="text" class="form-input" id="pd-reason" placeholder="e.g. Been in stock 60+ days"></div>
      <div style="padding:10px;background:#fff3cd;border-radius:8px;font-size:12px;color:#856404"><i class="fas fa-bell"></i> Team will be notified before the price goes live.</div>
    </div>
    <div class="modal-footer">
      <button class="tb-btn btn-ghost" onclick="document.getElementById('price-drop-modal').classList.remove('open')">Cancel</button>
      <button class="tb-btn btn-price-drop" onclick="applyPriceDrop()"><i class="fas fa-tag"></i> Apply Price Drop</button>
    </div>
  </div>
</div>

<script src="firebase-init.js"></script>
<script>
let vehicles = JSON.parse(JSON.stringify(AC_VEHICLES));
const showPurchasePrice = canSeePurchasePrice();

if (showPurchasePrice) {
  document.getElementById('pp-header').style.display = '';
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const fStage = document.getElementById('f-stage').value;
  const fStatus = document.getElementById('f-status').value;
  const fNoPrice = document.getElementById('f-no-price').value;

  let filtered = vehicles.filter(v => {
    if (search && !`${v.registration} ${v.make} ${v.model} ${v.colour}`.toLowerCase().includes(search)) return false;
    if (fStage === 'Sold' && v.status !== 'Sold') return false;
    if (fStage && fStage !== 'Sold' && v.workflowStage !== fStage) return false;
    if (fStatus && v.status !== fStatus) return false;
    if (fNoPrice && (v.price && v.price > 0)) return false;
    return true;
  });

  document.getElementById('row-count').textContent = `${filtered.length} vehicles`;

  const stageFilter = document.getElementById('f-stage');
  AC_WORKFLOW_STAGES.forEach(s => {
    if (!stageFilter.querySelector(`option[value="${s.name}"]`)) {
      const o = document.createElement('option');
      o.value = s.name; o.textContent = s.name;
      stageFilter.insertBefore(o, stageFilter.children[2]);
    }
  });

  const tbody = document.getElementById('inv-tbody');
  tbody.innerHTML = filtered.map(v => {
    const days = getDaysInStage(v.stageStarted);
    const daysCls = days<=1?'days-ok':days<=3?'days-warn':'days-over';
    const stage = AC_WORKFLOW_STAGES.find(s=>s.name===v.workflowStage);
    const stageColor = stage ? stage.color : '#64748b';
    const statusCls = v.status==='In Stock'?'status-in':v.status==='Sold'?'status-sold':'status-out';
    const mot = getMOTDaysLeft(v.mot);
    const motCls = mot <= 60 ? 'color:#ef4444;font-weight:700' : mot <= 180 ? 'color:#f59e0b;font-weight:600' : '';
    return `<tr onclick="location.href='vehicle-overview.html?reg=${v.registration}'">
      <td>${v.urgent?'<span class="urgent-dot"></span>':''}</td>
      <td class="reg">${v.registration}</td>
      <td>${v.make} ${v.model} <span style="color:var(--ink3)">${v.variant||''}</span></td>
      <td>${v.colour}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${parseInt(v.mileage||0).toLocaleString()}</td>
      <td style="${motCls}">${v.mot||'—'}</td>
      <td><span class="stage-badge" style="background:${stageColor}">${v.workflowStage}</span></td>
      <td><span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px" class="${daysCls}">${days}d</span></td>
      <td>${v.price&&v.price>0?'<b>£'+v.price.toLocaleString()+'</b>':'<span class="no-price">No Price</span>'}${v.priceDropped?'<span class="price-drop-badge">↓ DROP</span>':''}</td>
      ${showPurchasePrice?`<td class="purchase-price">${v.purchasePrice?'£'+v.purchasePrice.toLocaleString():'—'}</td>`:''}
      <td><span class="${statusCls}" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">${v.status}</span></td>
      <td><button onclick="event.stopPropagation();location.href='workflow.html'" style="padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--navy)"><i class="fas fa-arrow-right"></i></button></td>
    </tr>`;
  }).join('');
}

function openPriceDrop() {
  const sel = document.getElementById('pd-reg');
  sel.innerHTML = '<option value="">Select vehicle...</option>';
  vehicles.filter(v=>v.status==='In Stock').forEach(v => {
    const o = document.createElement('option');
    o.value = v.registration;
    o.textContent = `${v.registration} — ${v.make} ${v.model} (£${(v.price||0).toLocaleString()})`;
    sel.appendChild(o);
  });
  sel.onchange = () => {
    const v = vehicles.find(x=>x.registration===sel.value);
    document.getElementById('pd-current').value = v ? '£'+v.price.toLocaleString() : '';
  };
  document.getElementById('price-drop-modal').classList.add('open');
}

function applyPriceDrop() {
  const reg = document.getElementById('pd-reg').value;
  const newPrice = parseInt(document.getElementById('pd-new').value);
  const reason = document.getElementById('pd-reason').value;
  if (!reg || !newPrice) { showToast('Select vehicle and enter new price','error'); return; }
  const v = vehicles.find(x=>x.registration===reg);
  v.price = newPrice; v.priceDropped = true;
  showToast(`Price drop applied to ${reg} — £${newPrice.toLocaleString()}. Team notified.`,'warning');
  document.getElementById('price-drop-modal').classList.remove('open');
  renderTable();
}

document.getElementById('nav-user').textContent = getCurrentUser().name;
renderTable();
</script>
</body></html>
