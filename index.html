<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CapEye v10 — Dashboard</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="ac-data.js"></script>
<style>
:root{--red:#C8102E;--navy:#003DA5;--dark:#0B1120;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--bg:#F7F8FA;--white:#fff;--border:#E5E7EB;--green:#10b981;--amber:#f59e0b;--font:'IBM Plex Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--ink)}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-mark{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:2px;text-transform:uppercase}
.nav-name{font-size:14px;font-weight:700;color:var(--ink)}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--ink3);text-decoration:none;white-space:nowrap;transition:all .15s}
.nav-link:hover{background:var(--bg);color:var(--ink)}
.nav-link.active{background:var(--red);color:#fff}
.nav-link i{font-size:11px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-user{font-size:12px;font-weight:600;color:var(--ink3);background:var(--bg);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}
/* SHELL */
.shell{margin-top:54px;height:calc(100vh - 54px);overflow-y:auto;padding:20px}
/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.kpi:hover{border-color:var(--red);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kpi-v{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--ink);line-height:1}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-top:4px}
.kpi-dot{width:6px;height:6px;border-radius:50%;margin-top:6px}
/* GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px}
.card-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* TODAY VIEW */
.today-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.today-item:last-child{border-bottom:none}
.today-reg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--ink);background:var(--bg);padding:2px 7px;border-radius:4px;flex-shrink:0}
.today-stage{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;color:#fff;flex-shrink:0}
.today-who{font-size:11px;color:var(--ink3);margin-left:auto;flex-shrink:0}
.today-days{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.days-ok{background:#d1fae5;color:#065f46}
.days-warn{background:#fef3c7;color:#92400e}
.days-over{background:#fee2e2;color:#991b1b}
/* STAGE PIPELINE */
.pipeline{display:flex;flex-direction:column;gap:6px}
.pipe-row{display:flex;align-items:center;gap:8px}
.pipe-name{font-size:11px;font-weight:600;color:var(--ink2);width:110px;flex-shrink:0}
.pipe-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.pipe-fill{height:100%;border-radius:4px;transition:width .4s ease}
.pipe-count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--ink3);width:24px;text-align:right;flex-shrink:0}
/* EMPLOYEE CHART */
.emp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.emp-name{font-size:11px;font-weight:600;color:var(--ink2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-bar{flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.emp-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:700;color:#fff;min-width:20px;transition:width .4s ease}
/* ALERTS MINI */
.alert-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.alert-text{font-size:11px;color:var(--ink2);line-height:1.4}
.alert-tag{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink3);margin-top:2px}
/* URGENT BADGE */
.urgent-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
/* FULL WIDTH */
.full{grid-column:1/-1}
/* SCROLLABLE */
.scroll-list{max-height:280px;overflow-y:auto}
.scroll-list::-webkit-scrollbar{width:4px}
.scroll-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html"><span class="nav-mark">CE</span><span class="nav-name">CapEye</span></a>
  <div class="nav-div"></div>
  <div class="nav-links">
    <a class="nav-link active" href="index.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a class="nav-link" href="workflow.html"><i class="fas fa-arrows-rotate"></i> Workflow</a>
    <a class="nav-link" href="inventory.html"><i class="fas fa-car"></i> Inventory</a>
    <a class="nav-link" href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
    <a class="nav-link" href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
    <a class="nav-link" href="keys.html"><i class="fas fa-key"></i> Keys</a>
    <a class="nav-link" href="auction.html"><i class="fas fa-gavel"></i> Auction</a>
    <a class="nav-link" href="accessories.html"><i class="fas fa-wrench"></i> Accessories</a>
    <a class="nav-link" href="aftersales.html"><i class="fas fa-headset"></i> Aftersales</a>
    <a class="nav-link" href="audit.html"><i class="fas fa-list-check"></i> Audit</a>
    <a class="nav-link" href="team.html"><i class="fas fa-users"></i> Team</a>
    <a class="nav-link" href="admin.html"><i class="fas fa-cog"></i> Admin</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user">Keith Hardy</span>
  </div>
</nav>

<div class="shell">

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Main grid -->
  <div class="dash-grid">

    <!-- Today view -->
    <div class="card">
      <div class="card-h"><i class="fas fa-sun" style="color:var(--amber)"></i> Today — Active Jobs</div>
      <div class="scroll-list" id="today-list"></div>
    </div>

    <!-- Stage pipeline -->
    <div class="card">
      <div class="card-h"><i class="fas fa-stream" style="color:var(--navy)"></i> Vehicles by Stage</div>
      <div class="pipeline" id="pipeline"></div>
    </div>

    <!-- Employee workload -->
    <div class="card">
      <div class="card-h"><i class="fas fa-person-digging" style="color:var(--green)"></i> Employee Workload</div>
      <div id="emp-chart"></div>
    </div>

    <!-- Live alerts -->
    <div class="card">
      <div class="card-h"><i class="fas fa-triangle-exclamation" style="color:var(--red)"></i> Live Alerts</div>
      <div class="scroll-list" id="alerts-mini"></div>
    </div>

  </div>
</div>

<script src="firebase-init.js"></script>
<script>
// ── KPIs
function buildKPIs() {
  const v = AC_VEHICLES;
  const inStock  = v.filter(x => x.status==='In Stock').length;
  const sold     = v.filter(x => x.status==='Sold').length;
  const offSite  = v.filter(x => x.status==='Off-site').length;
  const ready    = v.filter(x => x.workflowStage==='Ready for Sale').length;
  const adv      = v.filter(x => x.workflowStage==='Advertising').length;
  const afters   = v.filter(x => x.workflowStage==='Aftersales').length;
  const overdue  = v.filter(x => isOverdue(x)).length;
  const urgent   = v.filter(x => x.urgent).length;
  const noPrice  = v.filter(x => (!x.price || x.price===0) && x.status==='In Stock').length;

  const kpis = [
    {v:inStock,  l:'In Stock',      color:'#3b82f6'},
    {v:ready,    l:'Ready',         color:'#0891b2'},
    {v:adv,      l:'Advertised',    color:'#8b5cf6'},
    {v:sold,     l:'Sold',          color:'#64748b'},
    {v:offSite,  l:'Off-Site',      color:'#f97316'},
    {v:afters,   l:'Aftersales',    color:'#f43f5e'},
    {v:overdue,  l:'Overdue >3d',   color:'#ef4444'},
    {v:urgent,   l:'Urgent',        color:'#C8102E'},
    {v:noPrice,  l:'No Price',      color:'#f59e0b'},
    {v:AC_AUCTION_VEHICLES.filter(x=>x.status!=='Sold at Auction').length, l:'Auction', color:'#a855f7'},
  ];
  const row = document.getElementById('kpi-row');
  row.innerHTML = kpis.map(k => `
    <div class="kpi" style="border-top:3px solid ${k.color}">
      <div class="kpi-v" style="color:${k.color}">${k.v}</div>
      <div class="kpi-l">${k.l}</div>
    </div>`).join('');
}

// ── Today view
function buildToday() {
  const list = document.getElementById('today-list');
  const active = AC_VEHICLES.filter(v =>
    !['Sold','Aftersales'].includes(v.workflowStage) && v.status !== 'Sold'
  ).sort((a,b) => (b.urgent?1:0)-(a.urgent?1:0) || getDaysInStage(b.stageStarted)-getDaysInStage(a.stageStarted));

  list.innerHTML = active.map(v => {
    const days = getDaysInStage(v.stageStarted);
    const cls = days<=1?'days-ok':days<=3?'days-warn':'days-over';
    const stage = AC_WORKFLOW_STAGES.find(s=>s.name===v.workflowStage);
    const color = stage ? stage.color : '#64748b';
    return `<div class="today-item" onclick="location.href='vehicle-overview.html?reg=${v.registration}'">
      ${v.urgent?'<span class="urgent-badge">URGENT</span>':''}
      <span class="today-reg">${v.registration}</span>
      <span class="today-stage" style="background:${color}">${v.workflowStage}</span>
      <span class="today-who">${stage?stage.assignedTo:'—'}</span>
      <span class="today-days ${cls}">${days}d</span>
    </div>`;
  }).join('');
}

// ── Pipeline
function buildPipeline() {
  const counts = {};
  AC_VEHICLES.forEach(v => { counts[v.workflowStage] = (counts[v.workflowStage]||0)+1; });
  const max = Math.max(...Object.values(counts), 1);
  const el = document.getElementById('pipeline');
  el.innerHTML = AC_WORKFLOW_STAGES.map(s => {
    const c = counts[s.name]||0;
    const w = c ? Math.max((c/max)*100,8) : 0;
    return `<div class="pipe-row">
      <span class="pipe-name">${s.name}</span>
      <div class="pipe-bar"><div class="pipe-fill" style="width:${w}%;background:${s.color}"></div></div>
      <span class="pipe-count">${c}</span>
    </div>`;
  }).join('');
}

// ── Employee workload
function buildEmployeeChart() {
  const jobs = {};
  AC_VEHICLES.forEach(v => {
    const stage = AC_WORKFLOW_STAGES.find(s=>s.name===v.workflowStage);
    if (!stage || ['Sold','Ready for Sale'].includes(v.workflowStage)) return;
    const key = stage.assignedTo;
    jobs[key] = (jobs[key]||0)+1;
  });
  const sorted = Object.entries(jobs).sort((a,b)=>b[1]-a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  const el = document.getElementById('emp-chart');
  el.innerHTML = sorted.map(([name,count]) => {
    const w = Math.max((count/max)*100,12);
    return `<div class="emp-row">
      <span class="emp-name">${name}</span>
      <div class="emp-bar">
        <div class="emp-fill" style="width:${w}%;background:var(--navy)">${count}</div>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--ink3);font-size:12px">No active jobs</div>';
}

// ── Alerts mini
function buildAlerts() {
  const el = document.getElementById('alerts-mini');
  const alerts = [];

  AC_VEHICLES.forEach(v => {
    const days = getDaysInStage(v.stageStarted);
    if (isOverdue(v)) alerts.push({color:'#ef4444',text:`${v.registration} — ${v.workflowStage} for ${days} days`,tag:'Overdue'});
    if (v.urgent) alerts.push({color:'#C8102E',text:`${v.registration} — Marked URGENT`,tag:'Urgent'});
    const mot = getMOTDaysLeft(v.mot);
    if (mot <= 180 && mot > 0) alerts.push({color:'#f59e0b',text:`${v.registration} — MOT expires in ${mot} days (${v.mot})`,tag:'MOT'});
    if ((!v.price||v.price===0) && v.status==='In Stock') alerts.push({color:'#f97316',text:`${v.registration} — No price set`,tag:'No Price'});
    if (v.workflowStage==='Ready for Sale' && !v.advertised) alerts.push({color:'#8b5cf6',text:`${v.registration} — Ready but not advertised`,tag:'Not Advertised'});
  });

  if (!alerts.length) {
    el.innerHTML = '<div style="color:var(--green);font-size:12px;font-weight:600">✓ No active alerts</div>';
    return;
  }
  el.innerHTML = alerts.slice(0,10).map(a => `
    <div class="alert-item">
      <div class="alert-dot" style="background:${a.color}"></div>
      <div><div class="alert-text">${a.text}</div><div class="alert-tag">${a.tag}</div></div>
    </div>`).join('');
}

// ── Init
document.getElementById('nav-user').textContent = getCurrentUser().name;
buildKPIs();
buildToday();
buildPipeline();
buildEmployeeChart();
buildAlerts();
</script>
</body>
</html>
