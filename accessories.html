<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CapEye v10 — Accessories</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="firebase-config.js"></script><script src="ac-data.js"></script>
<style>
:root{--red:#C8102E;--navy:#003DA5;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--bg:#F7F8FA;--border:#E5E7EB;--font:'IBM Plex Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--ink)}
.nav{position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.nav-mark{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:2px;text-transform:uppercase}
.nav-name{font-size:14px;font-weight:700;color:var(--ink)}
.nav-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--ink3);text-decoration:none;white-space:nowrap;transition:all .15s}
.nav-link:hover{background:var(--bg);color:var(--ink)}
.nav-link.active{background:var(--red);color:#fff}
.nav-link i{font-size:11px}
.nav-right{margin-left:auto;flex-shrink:0}
.nav-user{font-size:12px;font-weight:600;color:var(--ink3);background:var(--bg);padding:5px 10px;border-radius:20px;border:1px solid var(--border)}
.shell{margin-top:54px;height:calc(100vh - 54px);overflow-y:auto;padding:20px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700}
.tb-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:var(--font);border:none;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-red{background:var(--red);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.booking-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;border-left:4px solid var(--navy)}
.bc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bc-reg{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}
.bc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase}
.s-booked{background:#dbeafe;color:#1e40af}
.s-progress{background:#fef3c7;color:#92400e}
.s-done{background:#d1fae5;color:#065f46}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:18px;color:var(--ink3);cursor:pointer}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--ink)}
.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--ink);resize:vertical;min-height:70px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
</style>
</head><body>
<nav class="nav">
  <a class="nav-brand" href="index.html"><span class="nav-mark">CE</span><span class="nav-name">CapEye</span></a>
  <div class="nav-div"></div>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a class="nav-link" href="workflow.html"><i class="fas fa-arrows-rotate"></i> Workflow</a>
    <a class="nav-link" href="inventory.html"><i class="fas fa-car"></i> Inventory</a>
    <a class="nav-link" href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
    <a class="nav-link" href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
    <a class="nav-link" href="keys.html"><i class="fas fa-key"></i> Keys</a>
    <a class="nav-link" href="auction.html"><i class="fas fa-gavel"></i> Auction</a>
    <a class="nav-link active" href="accessories.html"><i class="fas fa-wrench"></i> Accessories</a>
    <a class="nav-link" href="aftersales.html"><i class="fas fa-headset"></i> Aftersales</a>
    <a class="nav-link" href="audit.html"><i class="fas fa-list-check"></i> Audit</a>
    <a class="nav-link" href="team.html"><i class="fas fa-users"></i> Team</a>
    <a class="nav-link" href="admin.html"><i class="fas fa-cog"></i> Admin</a>
  </div>
  <div class="nav-right"><span class="nav-user" id="nav-user">Keith Hardy</span></div>
</nav>
<div class="shell">
  <div class="page-hdr">
    <div>
      <div class="page-title"><i class="fas fa-wrench" style="color:var(--navy)"></i> Accessories</div>
      <div style="font-size:12px;color:var(--ink3);margin-top:2px">Customer vehicle accessory fittings — Marcin, Ibrahim & Keith</div>
    </div>
    <button class="tb-btn btn-red" onclick="openBooking()"><i class="fas fa-plus"></i> New Booking</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap" id="acc-kpis"></div>
  <div class="grid" id="acc-grid"></div>
</div>

<div class="modal-bg" id="booking-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">New Accessories Booking</div>
      <button class="modal-close" onclick="document.getElementById('booking-modal').classList.remove('open')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Customer Name</label><input type="text" class="form-input" id="acc-customer" placeholder="Full name"></div>
      <div class="form-row"><label class="form-label">Vehicle Registration</label><input type="text" class="form-input" id="acc-reg" placeholder="e.g. AB21CDE" style="text-transform:uppercase"></div>
      <div class="form-row"><label class="form-label">Vehicle Make/Model</label><input type="text" class="form-input" id="acc-model" placeholder="e.g. Ford Transit Custom"></div>
      <div class="form-row"><label class="form-label">Accessories Required</label><textarea class="form-textarea" id="acc-items" placeholder="e.g. Roof rack, tow bar, racking system..."></textarea></div>
      <div class="form-row"><label class="form-label">External Supplier (if needed)</label><input type="text" class="form-input" id="acc-supplier" placeholder="e.g. Rhino Accessories Ltd"></div>
      <div class="form-row"><label class="form-label">Booking Date</label><input type="date" class="form-input" id="acc-date"></div>
      <div class="form-row"><label class="form-label">Assigned To</label>
        <select class="form-input" id="acc-assign">
          <option value="Marcin Kiljan">Marcin Kiljan</option>
          <option value="Ibrahim Ata">Ibrahim Ata</option>
          <option value="Keith Hardy">Keith Hardy</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="tb-btn" style="background:transparent;border:1px solid var(--border);color:var(--ink3)" onclick="document.getElementById('booking-modal').classList.remove('open')">Cancel</button>
      <button class="tb-btn btn-red" onclick="saveBooking()"><i class="fas fa-save"></i> Save Booking</button>
    </div>
  </div>
</div>

<script src="firebase-init.js"></script>
<script>
document.getElementById('nav-user').textContent = getCurrentUser().name;

const DEMO_BOOKINGS = [
  {customer:'James Wilson',reg:'PL21KFH',model:'Vauxhall Vivaro',items:'Roof rack + ladder clamps',supplier:'Rhino Accessories',date:'26/03/2026',assignedTo:'Marcin Kiljan',status:'Booked'},
  {customer:'Auto Capital Stock',reg:'SB21DEF',model:'VW Transporter',items:'Internal racking system',supplier:'Van Vault',date:'27/03/2026',assignedTo:'Ibrahim Ata',status:'In Progress'},
  {customer:'David Freeman',reg:'KT71XYZ',model:'Ford Transit',items:'Tow bar + wiring kit',supplier:'External — BPS Motors',date:'28/03/2026',assignedTo:'Marcin Kiljan',status:'Booked'},
  {customer:'Sarah Ahmed',reg:'NK22LPQ',model:'Mercedes Vito',items:'Parking sensors + reversing cam',supplier:'',date:'01/04/2026',assignedTo:'Marcin Kiljan',status:'Done'},
];

const statusCls={Booked:'s-booked','In Progress':'s-progress',Done:'s-done'};
const kpis=[{v:DEMO_BOOKINGS.length,l:'Total',c:'#3b82f6'},{v:DEMO_BOOKINGS.filter(b=>b.status==='Booked').length,l:'Booked',c:'#6366f1'},{v:DEMO_BOOKINGS.filter(b=>b.status==='In Progress').length,l:'In Progress',c:'#f59e0b'},{v:DEMO_BOOKINGS.filter(b=>b.status==='Done').length,l:'Completed',c:'#10b981'}];
document.getElementById('acc-kpis').innerHTML=kpis.map(k=>`<div style="background:#fff;border-radius:10px;padding:12px 16px;border:1px solid var(--border);border-top:3px solid ${k.c}"><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:${k.c}">${k.v}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-top:3px">${k.l}</div></div>`).join('');

document.getElementById('acc-grid').innerHTML=DEMO_BOOKINGS.map(b=>`
  <div class="booking-card">
    <div class="bc-hdr">
      <div><div class="bc-reg">${b.reg}</div><div style="font-size:11px;color:var(--ink3)">${b.customer}</div></div>
      <span class="bc-status ${statusCls[b.status]||'s-booked'}">${b.status}</span>
    </div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:8px">${b.model}</div>
    <div style="font-size:12px;color:var(--ink2);margin-bottom:4px"><strong>Accessories:</strong> ${b.items}</div>
    ${b.supplier?`<div style="font-size:11px;color:var(--ink3);margin-bottom:4px"><i class="fas fa-truck"></i> Supplier: ${b.supplier}</div>`:''}
    <div style="font-size:11px;color:var(--ink3)"><i class="fas fa-calendar"></i> ${b.date} · <i class="fas fa-user"></i> ${b.assignedTo}</div>
  </div>`).join('');

function openBooking() { document.getElementById('booking-modal').classList.add('open'); }
function saveBooking() {
  const customer = document.getElementById('acc-customer').value;
  const reg = document.getElementById('acc-reg').value;
  if (!customer || !reg) { showToast('Customer and registration required','error'); return; }
  showToast(`Booking saved for ${reg} — ${customer}`,'success');
  document.getElementById('booking-modal').classList.remove('open');
}
</script>
</body></html>
